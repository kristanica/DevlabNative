<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Database Playground</title>

    <!-- CodeMirror CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 20px;
      }

      .container {
        max-width: 100%;
        margin: 0 auto;
      }

      h1 {
        color: #89b4fa;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .editor-wrapper {
        margin-bottom: 15px;
        border: 2px solid #313244;
        border-radius: 8px;
        overflow: hidden;
      }

      .CodeMirror {
        height: 200px;
        font-size: 14px;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      button {
        background: #89b4fa;
        color: #1e1e2e;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: background 0.3s;
      }

      button:hover {
        background: #74c7ec;
      }

      button:active {
        transform: scale(0.98);
      }

      .output {
        background: #181825;
        border: 2px solid #313244;
        border-radius: 8px;
        padding: 15px;
        min-height: 150px;
        overflow: auto;
      }

      .output h2 {
        color: #f38ba8;
        margin-bottom: 15px;
        font-size: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
        background: #11111b;
        border-radius: 6px;
        overflow: hidden;
      }

      th {
        background: #313244;
        color: #89b4fa;
        padding: 12px;
        text-align: left;
        font-weight: bold;
        border-bottom: 2px solid #45475a;
      }

      td {
        padding: 10px 12px;
        border-bottom: 1px solid #313244;
        color: #cdd6f4;
      }

      tr:hover {
        background: #1e1e2e;
      }

      .table-name {
        color: #f9e2af;
        font-size: 16px;
        font-weight: bold;
        margin: 15px 0 10px 0;
      }

      .error {
        color: #f38ba8;
        padding: 10px;
        background: #2e1a1f;
        border-left: 4px solid #f38ba8;
        border-radius: 4px;
        margin-bottom: 10px;
      }

      .success {
        color: #a6e3a1;
        padding: 10px;
        background: #1a2e1f;
        border-left: 4px solid #a6e3a1;
        border-radius: 4px;
        margin-bottom: 10px;
      }

      .info {
        color: #74c7ec;
        font-size: 14px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🗄️ SQL Database Playground</h1>

      <div class="editor-wrapper">
        <textarea id="sql-editor"></textarea>
      </div>

      <div class="controls">
        <button id="run-btn">▶️ Run Query</button>
        <button id="display-all-btn">📋 Display All Tables</button>
        <button id="clear-btn">🗑️ Clear Output</button>
      </div>

      <div class="output">
        <h2>📊 Query Results</h2>
        <div id="result-area">
          <div class="info">Execute a query to see results...</div>
        </div>
      </div>
    </div>

    <!-- SQL.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

    <!-- CodeMirror Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>

    <script>
      let db;
      let editor;

      // Initialize SQL.js Database
      async function initDatabase() {
        try {
          const SQL = await initSqlJs({
            locateFile: (file) =>
              `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`,
          });

          db = new SQL.Database();

          // Create sample tables
          db.run(`
          CREATE TABLE employees (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            name TEXT NOT NULL,
            department TEXT,
            salary NUMERIC,
            hire_date DATE
          );
        `);

          db.run(`
          CREATE TABLE departments (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            name TEXT NOT NULL,
            budget NUMERIC
          );
        `);

          // Insert sample data
          db.run(`
          INSERT INTO employees (name, department, salary, hire_date) VALUES
            ('Alice Smith', 'Engineering', 95000, '2020-01-15'),
            ('Bob Johnson', 'Marketing', 72000, '2019-03-20'),
            ('Carol Williams', 'Engineering', 98000, '2018-11-07'),
            ('Dave Brown', 'Finance', 115000, '2017-05-12'),
            ('Eve Davis', 'Engineering', 110000, '2021-08-30'),
            ('Frank Miller', 'Marketing', 68000, '2022-02-14');
        `);

          db.run(`
          INSERT INTO departments (name, budget) VALUES
            ('Engineering', 500000),
            ('Marketing', 250000),
            ('Finance', 300000);
        `);

          console.log("Database initialized successfully");

          // Set default query
          const defaultQuery = "SELECT * FROM employees LIMIT 5";
          editor.setValue(defaultQuery);

          // Send to React Native if available
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(
              JSON.stringify({
                type: "ready",
                defaultQuery: defaultQuery,
              })
            );
          }
        } catch (error) {
          console.error("Database initialization failed:", error);
          showError("Failed to initialize database: " + error.message);
        }
      }

      // Initialize CodeMirror Editor
      function initEditor() {
        editor = CodeMirror.fromTextArea(
          document.getElementById("sql-editor"),
          {
            mode: "text/x-sql",
            theme: "monokai",
            lineNumbers: true,
            lineWrapping: true,
            autoCloseBrackets: true,
            matchBrackets: true,
            indentUnit: 2,
            tabSize: 2,
          }
        );
      }

      // Convert SQL result to HTML table
      function resultToTable(result) {
        if (!result || !result.length) {
          return '<div class="info">Query executed successfully. No results returned.</div>';
        }

        const { columns, values } = result[0];

        if (!values.length) {
          return '<div class="info">No rows found.</div>';
        }

        let html = "<table>";

        // Header row
        html += "<thead><tr>";
        columns.forEach((col) => {
          html += `<th>${col}</th>`;
        });
        html += "</tr></thead>";

        // Data rows
        html += "<tbody>";
        values.forEach((row) => {
          html += "<tr>";
          row.forEach((cell) => {
            html += `<td>${cell !== null ? cell : "<i>NULL</i>"}</td>`;
          });
          html += "</tr>";
        });
        html += "</tbody></table>";

        return html;
      }

      // Run SQL Query
      function runQuery() {
        if (!db) {
          showError("Database not initialized yet!");
          return;
        }

        const query = editor.getValue().trim();

        if (!query) {
          showError("Please enter a SQL query!");
          return;
        }

        const resultArea = document.getElementById("result-area");

        try {
          const result = db.exec(query);
          const tableHTML = resultToTable(result);

          resultArea.innerHTML = `
          <div class="success">✅ Query executed successfully!</div>
          ${tableHTML}
        `;

          // Send to React Native if available
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(
              JSON.stringify({
                type: "query",
                query: query,
                result: tableHTML,
              })
            );
          }
        } catch (error) {
          const errorMsg = error.message || "Unknown error occurred";
          showError(errorMsg);

          // Send error to React Native if available
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(
              JSON.stringify({
                type: "error",
                message: errorMsg,
              })
            );
          }
        }
      }

      // Display All Tables
      function displayAllTables() {
        if (!db) {
          showError("Database not initialized yet!");
          return;
        }

        try {
          const tablesResult = db.exec(
            "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'"
          );

          if (!tablesResult.length || !tablesResult[0].values.length) {
            showError("No tables found in database!");
            return;
          }

          const resultArea = document.getElementById("result-area");
          let allTablesHTML =
            '<div class="success">✅ Displaying all tables</div>';
          let tableDataArray = [];

          tablesResult[0].values.forEach((row) => {
            const tableName = row[0];
            const tableResult = db.exec(`SELECT * FROM ${tableName}`);
            const tableHTML = resultToTable(tableResult);

            allTablesHTML += `<div class="table-name">📋 Table: ${tableName}</div>${tableHTML}`;

            tableDataArray.push({
              name: tableName,
              html: tableHTML,
            });
          });

          resultArea.innerHTML = allTablesHTML;

          // Send to React Native if available
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(
              JSON.stringify({
                type: "allTables",
                tables: tableDataArray,
              })
            );
          }
        } catch (error) {
          showError("Error displaying tables: " + error.message);
        }
      }

      // Show Error Message
      function showError(message) {
        const resultArea = document.getElementById("result-area");
        resultArea.innerHTML = `<div class="error">❌ Error: ${message}</div>`;
      }

      // Clear Output
      function clearOutput() {
        document.getElementById("result-area").innerHTML =
          '<div class="info">Execute a query to see results...</div>';
      }

      // Event Listeners
      document.getElementById("run-btn").addEventListener("click", runQuery);
      document
        .getElementById("display-all-btn")
        .addEventListener("click", displayAllTables);
      document
        .getElementById("clear-btn")
        .addEventListener("click", clearOutput);

      // Keyboard shortcut: Ctrl+Enter or Cmd+Enter to run query
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          runQuery();
        }
      });

      // Initialize everything
      initEditor();
      initDatabase();
    </script>
  </body>
</html>
