<!DOCTYPE html>
<html>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta charset="UTF-8" />
  <head>
    <script type="importmap">
      {
        "imports": {
          "codemirror/view": "https://esm.sh/@codemirror/view",
          "codemirror/state": "https://esm.sh/@codemirror/state",
          "codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark",
          "@ddietr/codemirror-theme-tokyo-night": "https://esm.sh/@ddietr/codemirror-themes/tokyo-night",
          "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html",
          "codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete",
          "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript",
          "codemirror/commands": "https://esm.sh/@codemirror/commands"
        }
      }
    </script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background-color: #1e1e2e;
        font-family: sans-serif;
      }

      #editor {
        height: 100%;
        width: 100%;
      }

      .cm-editor {
        height: 100%;
        width: 100%;
      }

      .run {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        font-size: 0.9rem;
        color: white;
        background-color: #9333ea;
        border-radius: 8px;
        height: 40px;
        width: 90px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .format {
        height: 40px;
        width: 90px;
        font-weight: bold;
        position: fixed;
        border-radius: 8px;
        border: none;
        font-size: 0.9rem;
        color: white;
        z-index: 10;
        bottom: 70px;
        right: 20px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        background-color: #9333ea;
      }
    </style>
  </head>
  <body>
    <button class="run">RUN</button>
    <button class="format">FORMAT</button>
    <div id="editor"></div>
    <!-- IF BREAK, REMOVE THIS -->
    <script src="https://unpkg.com/prettier@2.8.8/standalone.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-babel.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-html.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-postcss.js"></script>
    <!--  UP TO HERE-->
    <script type="module">
      import { EditorView, lineNumbers, keymap } from "codemirror/view";
      import { EditorState } from "codemirror/state";
      import { tokyoNight } from "@ddietr/codemirror-theme-tokyo-night";
      import { html } from "@codemirror/lang-html";
      import { css } from "@codemirror/lang-css";
      import { javascript } from "@codemirror/lang-javascript";
      import { autocompletion } from "codemirror/autocomplete";

      import { defaultKeymap } from "codemirror/commands";
      let language = { html: html(), css: css(), js: javascript() };
      const extensionList = [lineNumbers(), autocompletion(), tokyoNight];
      let code = { html: "", css: "", js: "" };

      let editor;

      newEditor(html());
      function newEditor(language, val) {
        editor = new EditorView({
          state: EditorState.create({
            doc: val || "",
            extensions: [language, extensionList, keymap.of(defaultKeymap)],
          }),
          parent: document.getElementById("editor"),
        });
        editor.focus();
      }
      let prevLang = "html";

      document.querySelector(".run").addEventListener("click", () => {
        code[prevLang] = editor.state.doc.toString();
        window.ReactNativeWebView.postMessage(JSON.stringify(code));
      });

      document.addEventListener("message", (e) => {
        const lang = e.data;
        if (!["html", "css", "js"].includes(lang)) return;

        code[prevLang] = editor.state.doc.toString();

        editor.destroy();
        prevLang = lang;
        newEditor(language[lang], code[lang]);
      });
      //   IF BREAK, REMOVE THIS
      function formatCode(lang, code) {
        let parser = "babel"; // default
        if (lang === "html") parser = "html";
        if (lang === "css") parser = "css";
        return prettier.format(code, { parser, plugins: prettierPlugins });
      }

      const formatted = formatCode("js", "function test(){console.log('hi')}");
      document.querySelector(".format").addEventListener("click", () => {
        const currentCode = editor.state.doc.toString();
        const formatted = formatCode(prevLang, currentCode);
        editor.dispatch({
          changes: { from: 0, to: editor.state.doc.length, insert: formatted },
        });
      });

      // UP TO HERE
    </script>
  </body>
</html>
