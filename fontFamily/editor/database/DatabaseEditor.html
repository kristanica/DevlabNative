<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="UTF-8" />
    <script type="importmap">
      {
        "imports": {
          "codemirror/view": "https://esm.sh/@codemirror/view",
          "codemirror/state": "https://esm.sh/@codemirror/state",
          "@ddietr/codemirror-theme-tokyo-night": "https://esm.sh/@ddietr/codemirror-themes/tokyo-night",
          "codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete",
          "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql",
          "codemirror/commands": "https://esm.sh/@codemirror/commands"
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/sql-wasm.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #1e1e2e;
        overflow: hidden;
      }

      .run {
        position: absolute;
        z-index: 1000;
        bottom: 5%;
        right: 15px;
        font-size: 0.8rem;
        color: white;
        background-color: #9333ea;
        border-radius: 10px;
        height: 30px;
        width: 80px;
        font-weight: bolder;
        border-color: #9333ea;
        border: none;
        cursor: pointer;
      }

      .getTable {
        position: absolute;
        z-index: 1000;
        bottom: 5%;
        right: 110px;
        font-size: 0.8rem;
        color: white;
        background-color: #2196f3;
        border-radius: 10px;
        height: 30px;
        width: 120px;
        font-weight: bolder;
        border: none;
        cursor: pointer;
      }

      .cm-editor {
        width: 100%;
        height: 100vh;
      }

      table,
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
      }
    </style>
  </head>
  <body>
    <button class="run">RUN</button>

    <div id="editor"></div>

    <script type="module">
      import { EditorView, lineNumbers, keymap } from "codemirror/view";
      import { EditorState } from "codemirror/state";
      import { tokyoNight } from "@ddietr/codemirror-theme-tokyo-night";
      import { autocompletion } from "codemirror/autocomplete";
      import { sql } from "@codemirror/lang-sql";
      import { defaultKeymap } from "codemirror/commands";

      const runButton = document.querySelector(".run");
      const extensionList = [
        lineNumbers(),
        autocompletion(),
        tokyoNight,
        keymap.of(defaultKeymap),
      ];
      let editor, val, db;

      // ✅ Initialize database and send all tables immediately
      const fetchSQL = async () => {
        try {
          val = await initSqlJs({
            locateFile: (file) =>
              `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.13.0/${file}`,
          });
          db = new val.Database();

          // --- PREDEFINED TABLES AND DATA ---
          db.exec(`
        CREATE TABLE students (
          id INTEGER PRIMARY KEY,
          name TEXT,
          age INTEGER,
          course TEXT
        );

        CREATE TABLE enrollments (
          id INTEGER PRIMARY KEY,
          student_id INTEGER,
          subject TEXT,
          grade INTEGER
        );

        INSERT INTO students VALUES
          (1, 'Anna', 20, 'Computer Science'),
          (2, 'Ben', 22, 'Information Technology'),
          (3, 'Clara', 21, 'Software Engineering'),
          (4, 'David', 23, 'Information Systems'),
          (5, 'Ella', 20, 'Computer Science');

        INSERT INTO enrollments VALUES
          (1, 1, 'Database Systems', 95),
          (2, 2, 'Web Development', 88),
          (3, 3, 'Operating Systems', 92),
          (4, 1, 'Web Development', 89),
          (5, 5, 'Database Systems', 85),
          (6, 4, 'Data Structures', 91),
          (7, 2, 'Networking', 90),
          (8, 3, 'Database Systems', 87),
          (9, 5, 'Programming 101', 93);
      `);

          // ✅ Automatically fetch and send ALL predefined tables
          const tables = db.exec(
            "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'"
          );

          let tableHTMLs = [];
          if (tables.length > 0) {
            tables[0].values.forEach((element) => {
              const tableName = element[0];
              const htmlTable = {
                name: tableName,
                html: displaySQLAsTable(`SELECT * FROM ${tableName}`),
              };
              tableHTMLs.push(htmlTable);
            });
          }

          // Send all predefined tables to React Native immediately
          window.ReactNativeWebView.postMessage(
            JSON.stringify({
              defaultTables: tableHTMLs,
            })
          );
        } catch (error) {
          console.error("SQL init error:", error);
        }
      };

      fetchSQL();

      // ✅ Handle user’s RUN button
      runButton.addEventListener("click", () => {
        const query = editor.state.doc.toString();
        const queryResult = displaySQLAsTable(query);

        // Always fetch updated table data as well
        const tables = db.exec(
          "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'"
        );

        let tableHTMLs = [];
        if (tables.length > 0) {
          tables[0].values.forEach((element) => {
            const tableName = element[0];
            const htmlTable = {
              name: tableName,
              html: displaySQLAsTable(`SELECT * FROM ${tableName}`),
            };
            tableHTMLs.push(htmlTable);
          });
        }

        // Send both query result + full table list
        window.ReactNativeWebView.postMessage(
          JSON.stringify({
            query: query,
            result: queryResult,
            allTables: tableHTMLs,
          })
        );
      });

      function displaySQLAsTable(query) {
        try {
          const result = db.exec(query);
          if (!result.length)
            return `<p style="
    color: #2e7d32;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background-color: #e8f5e9;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
  ">
    ✅ Query executed successfully (No results returned)
  </p>`;

          const { columns, values } = result[0];
          let html = `<table><tr>${columns
            .map((e) => `<th>${e}</th>`)
            .join("")}</tr>`;
          html += values
            .map(
              (row) =>
                `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`
            )
            .join("");
          html += "</table>";
          return html;
        } catch (error) {
          return `<p style="color:red;">${error.message}</p>`;
        }
      }

      newEditor(sql());
      function newEditor(language) {
        editor = new EditorView({
          state: EditorState.create({
            doc: "",
            extensions: [language, extensionList],
          }),
          parent: document.getElementById("editor"),
        });
      }
    </script>
  </body>
</html>
